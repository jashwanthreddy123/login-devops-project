apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: login-app

spec:

  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:

    metadata:
      labels:
        app: backend

    spec:

      containers:

      - name: backend

        image: jashwanth0310/login-backend:v3

        ports:
        - containerPort: 5000

        env:

        - name: DB_HOST
          value: postgres

        - name: DB_NAME
          value: login_db

        - name: DB_USER
          value: admin

        - name: DB_PASSWORD
          value: password
