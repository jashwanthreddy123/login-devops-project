name: CI-CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/login-app:latest .

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/login-app:latest

    - name: Deploy to Kubernetes
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          kubectl apply -f /home/ubuntu/login-devops-project/k8s/
