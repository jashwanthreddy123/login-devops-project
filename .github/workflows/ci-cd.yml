name: Login App CI-CD

on:
  push:
    branches:
      - master

jobs:

  build-deploy:

    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4


    # 2. Login to Docker Hub
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    # 3. Build Docker image
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.sha }} .


    # 4. Push Docker image
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.sha }}


    # 5. Deploy to Kubernetes server
    - name: Deploy Application
      uses: appleboy/ssh-action@v1
      with:

        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SSH_KEY }}

        script: |

          echo "Connected to server"

          cd /root/login-devops-project

          echo "Pull latest code"
          git pull origin master

          echo "Updating image"

          kubectl set image deployment/login-app \
          login-app=${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.sha }} \
          -n login-app


          echo "Applying Kubernetes files"

          kubectl apply -f k8s/ -n login-app


          echo "Deployment status"

          kubectl get pods -n login-app
