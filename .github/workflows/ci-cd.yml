name: Build-Test-Deploy

on:
  push:
    branches:
      - master


jobs:

  build-test-deploy:

    runs-on: ubuntu-latest

    steps:


    # 1. Checkout code
    - name: Checkout Code
      uses: actions/checkout@v4



    # 2. Build Docker image
    - name: Build Image
      run: |
        docker build \
        -t ${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.sha }} .



    # 3. Test container
    - name: Test Container
      run: |

        docker run -d \
        --name login-test \
        -p 8080:80 \
        ${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.sha }}


        sleep 10


        curl -f http://localhost:8080


        docker stop login-test
        docker rm login-test




    # 4. Docker Hub login
    - name: Docker Login
      uses: docker/login-action@v3

      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}




    # 5. Push Image
    - name: Push Image
      run: |

        docker push \
        ${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.sha }}






    # 6. Deploy Kubernetes
    - name: Deploy To Kubernetes
      uses: appleboy/ssh-action@v1


      with:

        host: ${{ secrets.SERVER_IP }}

        username: ubuntu

        key: ${{ secrets.SSH_KEY }}


        script: |


          echo "Connected"


          cd /home/ubuntu/login-devops-project


          echo "Pull latest code"

          git pull origin master



          echo "Updating image"


          kubectl set image deployment/login-app \
          login-app=${{ secrets.DOCKER_USERNAME }}/login-app:${{ github.sha }} \
          -n login-app



          echo "Applying Kubernetes files"


          kubectl apply -f k8s/ -n login-app



          echo "Rollout status"


          kubectl rollout status deployment/login-app -n login-app



          echo "Pods"


          kubectl get pods -n login-app
