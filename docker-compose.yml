services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    ports:
      - "8080:80"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "5000:5000"

    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: login_db
      DB_USER: admin
      DB_PASSWORD: password

    depends_on:
      - database


  database:
    image: postgres:16

    environment:
      POSTGRES_DB: login_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
